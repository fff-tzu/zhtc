<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>停车需求热力图</title>

  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    .legend {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 999;
      background: rgba(4, 13, 26, 0.88);
      color: #e8f4ff;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.8;
      border: 1px solid rgba(0, 212, 255, 0.35);
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.18);
    }

    .legend-title {
      color: #00d4ff;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .high { background: #f87171; }
    .mid { background: #fbbf24; }
    .low { background: #34d399; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css">

  <script src="https://cdn.jsdelivr.net/gh/Leaflet/Leaflet.heat/dist/leaflet-heat.js"></script>
</head>

<body>
<div id="map"></div>

<div class="legend">
  <div class="legend-title">停车需求热力说明</div>
  <div><span class="dot high"></span>高热力：需求集中 / 拥堵风险高</div>
  <div><span class="dot mid"></span>中热力：需求较高 / 建议关注</div>
  <div><span class="dot low"></span>低热力：车位相对充足</div>
</div>

<script>
  var map = L.map('map').setView([22.525, 113.952], 13);

  L.tileLayer(
    'https://wprd01.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=7',
    {
      attribution: '高德地图',
      maxZoom: 18
    }
  ).addTo(map);

  Promise.all([
    fetch('../json/parking_base.json').then(res => res.json()),
    fetch('../json/parking_prediction_simulated.json').then(res => res.json())
  ]).then(([baseData, predData]) => {

    var hour = new Date().getHours();
    var currentTime = hour < 10 ? "08:00" : (hour < 15 ? "12:00" : "18:00");

    var heatData = [];

    baseData.forEach(function(base) {
      var pred = predData.find(function(p) {
        return p.parking_id === base.id && p.time === currentTime;
      });

      if (!pred) return;

      heatData.push([
        base.lat,
        base.lng,
        pred.occupancy_rate
      ]);

      L.circleMarker([base.lat, base.lng], {
        radius: 6,
        color: '#00d4ff',
        fillColor: '#00d4ff',
        fillOpacity: 0.85
      }).addTo(map).bindPopup(
        '<b>' + base.name + '</b><br>' +
        '当前时段：' + currentTime + '<br>' +
        '占用率：' + Math.round(pred.occupancy_rate * 100) + '%<br>' +
        '风险等级：' + pred.risk
      );
    });

    L.heatLayer(heatData, {
      radius: 35,
      blur: 22,
      maxZoom: 18,
      minOpacity: 0.45,
      gradient: {
        0.2: '#34d399',
        0.5: '#fbbf24',
        0.8: '#f97316',
        1.0: '#f87171'
      }
    }).addTo(map);

  }).catch(function(error) {
    console.error("热力图数据加载失败：", error);
  });
</script>
</body>
</html>
