<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>停车场标点图</title>
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    .info-card {
      font-size: 13px;
      line-height: 1.8;
    }

    .info-card h4 {
      margin: 0 0 6px;
      color: #0a84ff;
    }

    .parking-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(255,255,255,0.95);
      border: 2px solid #0a84ff;
      box-shadow: 0 0 10px rgba(10,132,255,0.45);
    }

    .parking-icon.high {
      border-color: #ef4444;
      box-shadow: 0 0 10px rgba(239,68,68,0.45);
    }

    .parking-icon.mid {
      border-color: #f59e0b;
      box-shadow: 0 0 10px rgba(245,158,11,0.45);
    }

    .parking-icon.low {
      border-color: #22c55e;
      box-shadow: 0 0 10px rgba(34,197,94,0.45);
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css">
</head>

<body>
<div id="map"></div>

<script>
  var map = L.map('map').setView([22.525, 113.952], 13);

  L.tileLayer(
    'https://wprd01.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=7',
    {
      attribution: '高德地图',
      maxZoom: 18
    }
  ).addTo(map);

  function getRiskClass(risk) {
    if (risk === '高') return 'high';
    if (risk === '中') return 'mid';
    return 'low';
  }

  function formatRate(rate) {
    return Math.round(Number(rate || 0) * 100) + '%';
  }

  function getRecommendText(risk) {
    if (risk === '高') return '不推荐，建议分流';
    if (risk === '中') return '一般，可作为备选';
    return '推荐，车位较充足';
  }

  function makeParkingIcon(risk) {
    return L.divIcon({
      className: '',
      html: '<div class="parking-icon ' + getRiskClass(risk) + '">🅿️</div>',
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -14]
    });
  }

  Promise.all([
    fetch('../json/parking_base.json').then(function(res) { return res.json(); }),
    fetch('../json/parking_prediction_simulated.json').then(function(res) { return res.json(); })
  ]).then(function(result) {
    var baseData = result[0];
    var predData = result[1];

    var hour = new Date().getHours();
    var currentTime = hour < 10 ? '08:00' : (hour < 15 ? '12:00' : '18:00');
    var bounds = [];

    baseData.forEach(function(base) {
      var pred = predData.find(function(p) {
        return Number(p.parking_id) === Number(base.id) && p.time === currentTime;
      });

      if (!pred || isNaN(Number(base.lat)) || isNaN(Number(base.lng))) return;

      var marker = L.marker([Number(base.lat), Number(base.lng)], {
        icon: makeParkingIcon(pred.risk)
      }).addTo(map);

      bounds.push([Number(base.lat), Number(base.lng)]);

      marker.bindPopup(
        '<div class="info-card">' +
          '<h4>' + base.name + '</h4>' +
          '<div>所属公园：' + base.park + '</div>' +
          '<div>总车位：' + base.capacity + '</div>' +
          '<div>剩余车位：' + pred.available + '</div>' +
          '<div>占用率：' + formatRate(pred.occupancy_rate) + '</div>' +
          '<div>拥堵风险：' + pred.risk + '</div>' +
          '<div>预测需求：' + pred.prediction + '</div>' +
          '<div>推荐等级：' + getRecommendText(pred.risk) + '</div>' +
        '</div>'
      );
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [40, 40] });
    }

  }).catch(function(error) {
    console.error('停车场数据加载失败：', error);
  });
</script>
</body>
</html>
