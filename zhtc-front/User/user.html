<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据驱动的短时停车需求预测与动态引导系统</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --bg-deep:    #040d1a;
            --bg-panel:   #071526;
            --bg-card:    #0a1d35;
            --accent:     #00d4ff;
            --accent2:    #0a84ff;
            --accent3:    #00ff9d;
            --warn-low:   #34d399;
            --warn-mid:   #fbbf24;
            --warn-high:  #f87171;
            --text-pri:   #e8f4ff;
            --text-sec:   #7eb8d4;
            --text-dim:   #3a6080;
            --border:     rgba(0,212,255,0.15);
            --panel-w:    300px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            color: var(--text-pri);
            font-family: 'Noto Sans SC', sans-serif;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.03) 2px,
                    rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        .shell {
            display: grid;
            grid-template-rows: 56px 1fr;
            grid-template-columns: var(--panel-w) 1fr var(--panel-w);
            width: 100vw;
            height: 100vh;
        }

        /* header */
        .hdr {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: linear-gradient(90deg, #040d1a 0%, #071e38 35%, #071e38 65%, #040d1a 100%);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .hdr::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 480px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .hdr-kpi {
            display: flex;
            gap: 32px;
        }

        .kpi-item {
            display: flex;
            flex-direction: column;
        }

        .kpi-label {
            font-size: 11px;
            color: var(--text-sec);
            letter-spacing: .5px;
        }

        .kpi-value {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 700;
            color: #ffd060;
            line-height: 1.2;
        }

        .hdr-title {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--text-pri);
            text-shadow: 0 0 24px rgba(0,212,255,0.6);
            text-align: center;
        }

        .hdr-title small {
            display: block;
            font-size: 9px;
            color: var(--accent);
            letter-spacing: 6px;
            font-weight: 400;
            margin-top: 2px;
        }

        .hdr-meta {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .clock-box {
            text-align: right;
        }

        .clock-time {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .clock-date {
            font-size: 11px;
            color: var(--text-sec);
            margin-top: 1px;
        }

        .weather-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,212,255,0.06);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 12px;
        }

        .weather-chip .wicon {
            font-size: 22px;
        }

        .weather-chip .winfo {
            font-size: 11px;
            color: var(--text-sec);
            line-height: 1.5;
        }

        .weather-chip .winfo strong {
            color: var(--text-pri);
            font-weight: 500;
        }

        /* panels */
        .panel-left,
        .panel-right {
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-left {
            border-right: 1px solid var(--border);
        }

        .panel-right {
            border-left: 1px solid var(--border);
        }

        .panel-center {
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
            position: relative;
            overflow: hidden;
        }

        /* section card */
        .sec-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--border);
            min-height: 0;
            overflow: hidden;
        }

        .sec-card:last-child {
            border-bottom: none;
        }

        .sec-hdr {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(0,212,255,0.04);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sec-hdr::before {
            content: '';
            width: 3px;
            height: 16px;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
            border-radius: 2px;
            flex-shrink: 0;
        }

        .sec-hdr h6 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-pri);
            letter-spacing: .5px;
            white-space: nowrap;
        }

        .sec-body {
            flex: 1;
            overflow: hidden;
            padding: 8px 10px;
            position: relative;
        }

        /* map */
        .map-switch-bar {
            display: flex;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .map-btn {
            padding: 4px 18px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-sec);
            font-size: 12px;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: all .2s;
        }

        .map-btn.active,
        .map-btn:hover {
            background: rgba(0,212,255,0.12);
            color: var(--accent);
            border-color: rgba(0,212,255,0.5);
            box-shadow: 0 0 8px rgba(0,212,255,0.15);
        }

        .map-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .map-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* chart */
        #chart-line,
        #chart-bar {
            width: 100%;
            height: 100%;
        }

        /* risk */
        .risk-header {
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            padding: 5px 10px;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .risk-scroll {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .risk-list {
            width: 100%;
        }

        .risk-row {
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            padding: 6px 10px;
            align-items: center;
            border-bottom: 1px solid rgba(0,212,255,0.05);
            transition: background .15s;
            cursor: pointer;
            font-size: 11px;
        }

        .risk-row:hover {
            background: rgba(0,212,255,0.05);
        }

        .risk-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }

        .risk-low  { background: rgba(52,211,153,0.12); color: var(--warn-low);  border: 1px solid rgba(52,211,153,0.25); }
        .risk-mid  { background: rgba(251,191,36,0.12);  color: var(--warn-mid);  border: 1px solid rgba(251,191,36,0.25); }
        .risk-high { background: rgba(248,113,113,0.12); color: var(--warn-high); border: 1px solid rgba(248,113,113,0.25); }

        .r-name {
            color: var(--text-sec);
            font-size: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 6px;
        }

        .r-time {
            color: var(--text-dim);
            font-size: 10px;
            text-align: right;
        }

        /* route planner */
        .route-planner {
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .route-info-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,212,255,0.06);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
        }

        .route-info-bar .ri-icon {
            font-size: 14px;
        }

        .route-info-bar .ri-text {
            font-size: 11px;
            color: var(--text-sec);
        }

        .route-info-bar .ri-text strong {
            color: var(--accent);
            font-weight: 500;
        }

        .route-field {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .route-field label {
            font-size: 10px;
            color: var(--text-dim);
        }

        .route-field input {
            background: rgba(0,212,255,0.05);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 5px 8px;
            color: var(--text-pri);
            font-size: 12px;
            font-family: 'Noto Sans SC', sans-serif;
            outline: none;
            transition: border-color .2s;
            width: 100%;
        }

        .route-field input:focus {
            border-color: rgba(0,212,255,0.5);
        }

        .route-btn {
            width: 100%;
            padding: 8px;
            background: linear-gradient(90deg, rgba(0,132,255,0.3), rgba(0,212,255,0.2));
            border: 1px solid rgba(0,212,255,0.4);
            border-radius: 6px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all .2s;
            margin-top: 2px;
        }

        .route-btn:hover {
            background: linear-gradient(90deg, rgba(0,132,255,0.5), rgba(0,212,255,0.35));
            box-shadow: 0 0 16px rgba(0,212,255,0.3);
        }

        /* decoration */
        .corner-deco {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--accent);
            border-style: solid;
            opacity: .5;
            pointer-events: none;
        }

        .c-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .c-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
        .c-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
        .c-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shell > * { animation: fadeUp .4s ease both; }
        .panel-left { animation-delay: .05s; }
        .panel-right { animation-delay: .1s; }

        /* rank list */
        #rank-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .rank-item {
            display: grid;
            grid-template-columns: 18px 1fr auto;
            align-items: center;
            gap: 7px;
            padding: 5px 7px;
            border-radius: 5px;
            background: rgba(0,212,255,0.03);
            border: 1px solid rgba(0,212,255,0.06);
            transition: background .15s;
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .rank-item:hover {
            background: rgba(0,212,255,0.07);
            border-color: rgba(0,212,255,0.18);
        }

        .rank-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            border-radius: 5px 0 0 5px;
            width: 3px;
        }

        .rank-item.risk-high::before { background: #f87171; }
        .rank-item.risk-mid::before  { background: #fbbf24; }
        .rank-item.risk-low::before  { background: #34d399; }

        .rank-no {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            font-weight: 700;
        }

        .rank-no.top1 { color: #ffd060; }
        .rank-no.top2 { color: #b0bec5; }
        .rank-no.top3 { color: #cd7f32; }

        .rank-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .rank-name {
            font-size: 10px;
            color: var(--text-sec);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rank-bar-wrap {
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 1px;
        }

        .rank-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .6s ease;
        }

        .rank-avail {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
            flex-shrink: 0;
        }

        .rank-avail-num {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            line-height: 1;
        }

        .rank-avail-label {
            font-size: 9px;
            color: var(--text-dim);
        }

        .rank-item.risk-high .rank-avail-num { color: #f87171; }
        .rank-item.risk-mid  .rank-avail-num { color: #fbbf24; }
        .rank-item.risk-low  .rank-avail-num { color: #34d399; }

        .rank-item.risk-high .rank-bar-fill { background: linear-gradient(90deg, #f87171, #fca5a5); }
        .rank-item.risk-mid  .rank-bar-fill { background: linear-gradient(90deg, #fbbf24, #fde68a); }
        .rank-item.risk-low  .rank-bar-fill { background: linear-gradient(90deg, #34d399, #6ee7b7); }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: .3; }
        }

        .live-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent3);
            margin-right: 4px;
            animation: pulse-dot 1.6s ease infinite;
        }
    </style>
</head>
<body>

<div class="shell">
    <header class="hdr">
        <div class="hdr-kpi">
            <div class="kpi-item">
                <span class="kpi-label">停车场总数</span>
                <span class="kpi-value" id="kv-orders">5465</span>
            </div>
            <div class="kpi-item">
                <span class="kpi-label">可用车位数</span>
                <span class="kpi-value" id="kv-bikes">1752</span>
            </div>
        </div>

        <div class="hdr-title">
            数据驱动的短时停车需求预测与动态引导系统
            <small>SHORT-TERM PARKING DEMAND PREDICTION & GUIDANCE</small>
        </div>

        <div class="hdr-meta">
            <div class="clock-box">
                <div class="clock-time" id="clock">00:00:00</div>
                <div class="clock-date" id="clock-date">--</div>
            </div>
            <div class="weather-chip">
                <span class="wicon">⛅</span>
                <div class="winfo">
                    <strong>多云&nbsp;22–26℃</strong><br>深圳市
                </div>
            </div>
        </div>
    </header>

    <aside class="panel-left">
        <div class="sec-card" style="flex:1.1">
            <div class="sec-hdr">
                <h6><span class="live-dot"></span>短时停车需求预测</h6>
            </div>
            <div class="sec-body" style="padding:4px 6px">
                <div id="chart-line"></div>
            </div>
        </div>

        <div class="sec-card" style="flex:1">
            <div class="sec-hdr">
                <h6>停车场剩余车位排行</h6>
            </div>
            <div class="sec-body" style="padding:6px 10px; overflow-y:auto;" id="rank-body">
                <div id="rank-list"></div>
                <div id="chart-bar" style="display:none;width:100%;height:100%"></div>
            </div>
        </div>
    </aside>

    <main class="panel-center">
        <div class="map-switch-bar">
            <button class="map-btn active" id="btn-point" type="button">标点图</button>
            <button class="map-btn" id="btn-heat" type="button">热力图</button>
        </div>

        <div class="map-wrap">
            <div class="corner-deco c-tl"></div>
            <div class="corner-deco c-tr"></div>
            <div class="corner-deco c-bl"></div>
            <div class="corner-deco c-br"></div>

            <iframe class="map-frame" id="map-point" src="./static/标点图.html"></iframe>
            <iframe class="map-frame" id="map-heat" src="./static/hotheat.html" style="display:none"></iframe>
            <iframe class="map-frame" id="map-route" src="./static/路线图.html" style="display:none"></iframe>
        </div>
    </main>

    <aside class="panel-right">
        <div class="sec-card" style="flex:1.6">
            <div class="sec-hdr">
                <h6>停车场拥堵风险预警</h6>
            </div>
            <div class="risk-header">
                <span>风险度</span>
                <span>区域</span>
                <span>时段</span>
            </div>
            <div class="risk-scroll">
                <div class="risk-list" id="risk-list"></div>
            </div>
        </div>

        <div class="sec-card" style="flex:0 0 auto">
            <div class="sec-hdr">
                <h6>停车路线引导</h6>
            </div>
            <div class="route-planner">
                <div class="route-info-bar">
                    <span class="ri-icon">📍</span>
                    <div class="ri-text">当前位置：<strong>深圳湾公园游客入口</strong></div>
                </div>

                <div class="route-field">
                    <label for="dest">目的地 / 公园名称</label>
<input type="text" id="dest" placeholder="例如：深圳湾公园、莲花山公园..." autocomplete="off">
                </div>

                <div class="route-field">
                    <label for="dep-time">预计出发时间</label>
                    <input type="time" id="dep-time">
                </div>

                <button class="route-btn" id="btn-route" type="button">推荐最优停车场</button>
            </div>
        </div>
    </aside>
</div>

<script src="./js/jquery-3.3.1.min.js"></script>
<script src="./js/base.js"></script>
<script src="./js/echarts.min.js"></script>
<script src="./js/fontscroll.js"></script>
<script src="./js/map.js"></script>

<script>
    (function tick() {
        var d = new Date();
        var pad = function(n){ return String(n).padStart(2,'0'); };
        document.getElementById('clock').textContent =
            pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        var wk = ['周日','周一','周二','周三','周四','周五','周六'];
        document.getElementById('clock-date').textContent =
            d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate()) +
            '  ' + (d.getHours() < 12 ? 'AM' : 'PM') + '  ' + wk[d.getDay()];
        setTimeout(tick, 1000);
    })();

    var mapFrames = {
        point: document.getElementById('map-point'),
        heat: document.getElementById('map-heat'),
        route: document.getElementById('map-route')
    };

    function showMap(key) {
        Object.keys(mapFrames).forEach(function(k){
            mapFrames[k].style.display = k === key ? 'block' : 'none';
        });
    }

    document.getElementById('btn-point').addEventListener('click', function () {
        showMap('point');
        document.querySelectorAll('.map-btn').forEach(function(btn){ btn.classList.remove('active'); });
        this.classList.add('active');
    });

    document.getElementById('btn-heat').addEventListener('click', function () {
        showMap('heat');
        document.querySelectorAll('.map-btn').forEach(function(btn){ btn.classList.remove('active'); });
        this.classList.add('active');
    });

    // ─── 【改动1】四维评分模型 ───────────────────────────────────────────
    // Score = 0.4×剩余率 + 0.3×空闲率 + 0.2×(1-预测压力) + 0.1×(1-距离归一)
    var USER_LAT = 22.5240;
    var USER_LNG = 113.9510;

    function calcParkingScore(base, pred) {
        var distDeg = Math.sqrt(
            Math.pow(base.lat - USER_LAT, 2) + Math.pow(base.lng - USER_LNG, 2)
        );
        var distNorm   = Math.min(distDeg / 0.12, 1);
        var availRate  = pred.available / base.capacity;
        var freeRate   = 1 - pred.occupancy_rate;
        var predPress  = Math.min(pred.prediction / base.capacity, 1);
        var score = 0.4 * availRate
                  + 0.3 * freeRate
                  + 0.2 * (1 - predPress)
                  + 0.1 * (1 - distNorm);
        return Math.round(score * 100);
    }

    // ─── 【改动2】智能预警文案生成 ─────────────────────────────────────────
    function generateAdvice(pred, base) {
        var rate    = pred.occupancy_rate;
        var press   = pred.prediction / base.capacity;
        var timeMap = { '08:00': '早高峰', '12:00': '午高峰', '18:00': '晚高峰' };
        var period  = timeMap[pred.time] || pred.time;

        if (rate > 0.85 && press > 0.9) {
            return '⚠️ ' + period + '需求预计达 ' + pred.prediction + ' 个车位，将超容量，建议提前30分钟出发';
        } else if (rate > 0.6) {
            return '📊 ' + period + '中等负荷，剩余 ' + pred.available + ' 个车位，建议正常出发';
        } else {
            return '✅ 当前空闲充裕，剩余 ' + pred.available + ' 个车位，为本时段最优选择';
        }
    }

    document.getElementById('btn-route').addEventListener('click', function () {
        var inputTime = document.getElementById('dep-time').value || '12:00';
        var currentTime;
        if (inputTime < '10:00')      currentTime = '08:00';
        else if (inputTime < '15:00') currentTime = '12:00';
        else                          currentTime = '18:00';

        Promise.all([
            fetch('./json/parking_base.json').then(function(res) { return res.json(); }),
            fetch('./json/parking_prediction_simulated.json').then(function(res) { return res.json(); })
        ]).then(function(result) {
            var baseData = result[0];
            var predData = result[1];
            var destKeyword = document.getElementById('dest').value.trim();

            var candidates = predData
                .filter(function(item) { return item.time === currentTime; })
                .map(function(item) {
                    var base = baseData.find(function(b) { return b.id === item.parking_id; });
                    if (!base) return null;
                    return {
                        parking_id : item.parking_id,
                        park       : base.park,
                        name       : base.name,
                        capacity   : base.capacity,
                        lat        : base.lat,
                        lng        : base.lng,
                        available  : Number(item.available),
                        risk       : item.risk,
                        occupancy_rate : Number(item.occupancy_rate),
                        prediction : Number(item.prediction),
                        time       : item.time,
                        score      : calcParkingScore(base, item)   // ← 四维评分
                    };
                })
                .filter(Boolean);

            if (destKeyword) {
                candidates = candidates.filter(function(item) {
                    return item.park.indexOf(destKeyword) !== -1 || item.name.indexOf(destKeyword) !== -1;
                });
            }

            // 按综合评分降序
            candidates.sort(function(a, b) { return b.score - a.score; });

            if (candidates.length === 0) {
                alert('没有找到匹配的停车场，请输入：深圳湾公园、莲花山公园、笔架山公园、中心公园、洪湖公园');
                return;
            }

            var best = candidates[0];
            var advice = generateAdvice(best, best);

            // 更新推荐结果展示
            document.getElementById('dest').value = best.name;
            document.getElementById('map-route').src =
                './static/路线图.html?parking_id=' + best.parking_id + '&time=' + currentTime;
            showMap('route');
            document.querySelectorAll('.map-btn').forEach(function(btn) { btn.classList.remove('active'); });

            // 在路线引导区域显示评分卡片
            var existCard = document.getElementById('score-card');
            if (existCard) existCard.remove();

            var card = document.createElement('div');
            card.id = 'score-card';
            card.style.cssText = [
                'margin-top:10px',
                'padding:10px 12px',
                'background:rgba(0,212,255,0.07)',
                'border:1px solid rgba(0,212,255,0.25)',
                'border-radius:6px',
                'font-size:12px',
                'line-height:2',
                'color:#e8f4ff'
            ].join(';');

            var riskColor = { '低':'#34d399','中':'#fbbf24','高':'#f87171' };
            card.innerHTML =
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">' +
                  '<span style="color:#00d4ff;font-weight:bold;font-size:13px">' + best.name.replace('深圳湾公园-','') + '</span>' +
                  '<span style="background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.4);' +
                    'border-radius:4px;padding:1px 8px;color:#00d4ff;font-size:13px;font-weight:bold">' +
                    '综合评分 ' + best.score + '</span>' +
                '</div>' +
                '<div>剩余车位：<b style="color:#00d4ff">' + best.available + '</b> &nbsp;|&nbsp; ' +
                  '占用率：<b>' + Math.round(best.occupancy_rate * 100) + '%</b> &nbsp;|&nbsp; ' +
                  '风险：<b style="color:' + riskColor[best.risk] + '">' + best.risk + '</b></div>' +
                '<div style="margin-top:4px;color:#acd6f0">' + advice + '</div>';

            document.querySelector('.route-planner').appendChild(card);

        }).catch(function(error) {
            console.error('路线推荐失败：', error);
            alert('路线推荐失败，请检查 JSON 数据文件。');
        });
    });

Promise.all([
    fetch('./json/parking_base.json').then(function(res) {
        return res.json();
    }),
    fetch('./json/parking_prediction_simulated.json').then(function(res) {
        return res.json();
    })
]).then(function(result) {
    var baseData = result[0];
    var predData = result[1];

    predData.forEach(function(pred) {
        var base = baseData.find(function(item) {
            return item.id === pred.parking_id;
        });

        if (base) {
            pred.parking_name = base.name;
            pred.capacity = base.capacity;
            pred.park = base.park;
        }
    });

    initPage(predData);
}).catch(function(error) {
    console.error('停车数据加载失败：', error);
});
        

    function initPage(data) {
        initKpi(data);
        initRiskList(data);
        initCharts(data);
    }

    function initKpi(data) {
        var currentData = data.filter(function(item) {
            return item.time === '12:00';
        });

        var parkingCount = currentData.length;
        var totalAvailable = currentData.reduce(function(sum, item) {
            return sum + Number(item.available);
        }, 0);

        document.getElementById('kv-orders').textContent = parkingCount;
        document.getElementById('kv-bikes').textContent = totalAvailable;
    }

    function initRiskList(data) {
        var riskData = data.filter(function(item) {
            return item.time === '18:00';
        });

        var riskMap = {
            '低': 'risk-low',
            '中': 'risk-mid',
            '高': 'risk-high'
        };

        var rl = document.getElementById('risk-list');
        rl.innerHTML = '';

        riskData.forEach(function(item) {
            var row = document.createElement('div');
            row.className = 'risk-row';

            row.innerHTML =
                '<span class="risk-badge ' + riskMap[item.risk] + '">' + item.risk + '风险</span>' +
                '<span class="r-name">' + item.parking_name + '</span>' +
                '<span class="r-time">' + item.time + '</span>';

            rl.appendChild(row);
        });

        startAutoScroll(rl);
    }

    function startAutoScroll(list) {
        var offset = 0;
        var rowH = 30;

        setInterval(function() {
            if (!list.firstElementChild) return;

            offset += 1;

            if (offset >= rowH) {
                offset = 0;
                list.appendChild(list.firstElementChild);
            }

            list.style.transform = 'translateY(-' + offset + 'px)';
        }, 40);
    }

    function initCharts(data) {
        if (typeof echarts === 'undefined') return;

        var lineData = data.filter(function(item) {
            return item.parking_id === 1;
        });

        var timeList = lineData.map(function(item) {
            return item.time;
        });

        var occupiedList = lineData.map(function(item) {
            return item.occupied;
        });

        var predictionList = lineData.map(function(item) {
            return item.prediction;
        });

        var currentData = data.filter(function(item) {
            return item.time === '12:00';
        });

        var barNames = currentData.map(function(item) {
            return item.parking_name
                .replace('深圳湾公园-', '')
                .replace('停车场', '')
                .replace('海滨生态公园', '')
                .replace('公园', '');
        });

        var barAvailable = currentData.map(function(item) {
            return item.available;
        });

        var lc = echarts.init(document.getElementById('chart-line'));
        lc.setOption({
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(4,13,26,0.9)',
                borderColor: 'rgba(0,212,255,0.3)',
                textStyle: { color: '#e8f4ff', fontSize: 11 },
                formatter: function(params) {
                    var time = params[0].axisValue;
                    var occupied   = params[0] ? params[0].value : '-';
                    var predicted  = params[1] ? params[1].value : '-';
                    return time + '<br/>当前占用：' + occupied + ' 个车位<br/>预测需求：' + predicted + ' 个车位';
                }
            },
            legend: {
                top: 2,
                data: ['当前占用', '预测需求'],
                textStyle: { color: 'rgba(200,230,255,.6)', fontSize: 10 },
                itemWidth: 12, itemHeight: 8
            },
            grid: { left: 32, top: 24, right: 10, bottom: 20, containLabel: false },
            xAxis: [{
                type: 'category',
                boundaryGap: false,
                data: timeList,
                axisLabel: { color: 'rgba(126,184,212,.6)', fontSize: 10 },
                axisLine: { lineStyle: { color: 'rgba(0,212,255,.1)' } }
            }],
            yAxis: [{
                type: 'value',
                axisTick: { show: false },
                axisLine: { show: false },
                axisLabel: { color: 'rgba(126,184,212,.6)', fontSize: 10 },
                splitLine: { lineStyle: { color: 'rgba(0,212,255,.07)' } }
            }],
            series: [
                {
                    name: '当前占用',
                    type: 'line',
                    smooth: true,
                    showSymbol: true,
                    symbolSize: 5,
                    lineStyle: { color: '#0184d5', width: 2 },
                    itemStyle: { color: '#0184d5' },
                    data: occupiedList
                },
                {
                    name: '预测需求',
                    type: 'line',
                    smooth: true,
                    showSymbol: true,
                    symbolSize: 5,
                    lineStyle: { color: '#00d887', width: 2 },
                    itemStyle: { color: '#00d887' },
                    data: predictionList
                },
                // ─── 【改动3】预测置信区间上界（±10%阴影带）─────────────
                {
                    name: '置信上界',
                    type: 'line',
                    smooth: true,
                    showSymbol: false,
                    lineStyle: { opacity: 0 },
                    areaStyle: { opacity: 0.13, color: '#00d887' },
                    stack: 'confidence',
                    tooltip: { show: false },
                    data: predictionList.map(function(v) { return Math.round(v * 1.1); })
                },
                {
                    name: '置信下界',
                    type: 'line',
                    smooth: true,
                    showSymbol: false,
                    lineStyle: { opacity: 0 },
                    areaStyle: { opacity: 0, color: 'transparent' },
                    stack: 'confidence',
                    tooltip: { show: false },
                    data: predictionList.map(function(v) { return Math.round(v * 0.9); })
                }
            ]
        });

        // ─── 【改动4】柱状图按风险着色 + 显示综合评分 ─────────────────────
        var barScores = currentData.map(function(item) {
            var base = { capacity: item.capacity || 200, lat: 22.524, lng: 113.951 };
            // 从 baseData 取真实坐标（此时 baseData 已在外层 Promise 中，需在内部重算）
            return calcParkingScore(
                { capacity: item.capacity, lat: 22.524, lng: 113.951 },
                item
            );
        });

        var riskColorMap = { '低': '#34d399', '中': '#fbbf24', '高': '#f87171' };
        var barColors = currentData.map(function(item) {
            return riskColorMap[item.risk] || '#00d4ff';
        });

        // ─── Rank list render ───────────────────────────────────────────────
        var rankList = document.getElementById('rank-list');
        if (rankList) {
            rankList.innerHTML = '';
            var sortedData = currentData.slice().sort(function(a, b) {
                return Number(b.available) - Number(a.available);
            });
            var maxAvail = sortedData.length > 0 ? Number(sortedData[0].available) : 1;
            var riskClassMap = { '低': 'risk-low', '中': 'risk-mid', '高': 'risk-high' };
            var noClass = ['top1','top2','top3'];

            sortedData.forEach(function(item, idx) {
                var avail = Number(item.available);
                var cap   = Number(item.capacity) || 1;
                var pct   = Math.round(avail / maxAvail * 100);
                var shortName = (item.parking_name || '')
                    .replace('深圳湾公园-','')
                    .replace('停车场','')
                    .replace('海滨生态公园','')
                    .replace('公园','');
                var rCls  = riskClassMap[item.risk] || 'risk-low';
                var noCls = noClass[idx] || '';

                var row = document.createElement('div');
                row.className = 'rank-item ' + rCls;
                row.innerHTML =
                    '<div class="rank-no ' + noCls + '">' + (idx + 1) + '</div>' +
                    '<div class="rank-info">' +
                        '<div class="rank-name">' + shortName + '</div>' +
                        '<div class="rank-bar-wrap">' +
                            '<div class="rank-bar-fill" style="width:' + pct + '%"></div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="rank-avail">' +
                        '<span class="rank-avail-num">' + avail + '</span>' +
                        '<span class="rank-avail-label">剩余</span>' +
                    '</div>';
                rankList.appendChild(row);
            });
        }

        window.addEventListener('resize', function () {
            lc.resize();
        });
    }
</script>
